apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
  namespace: citizen-portal
spec:
  schedule: "0 2 * * *" # Daily backups at 2:00 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backend-sa
          containers:
          - name: pg-backup
            image: postgres:15
            command: ["/bin/bash", "/scripts/backup.sh"]
            envFrom:
              - secretRef:
                  name: citizen-portal-secret
            volumeMounts:
              - name: backup-storage
                mountPath: /backups
              - name: backup-scripts
                mountPath: /scripts
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: pg-backup-pvc
            - name: backup-scripts
              configMap:
                name: pg-backup-scripts
                defaultMode: 0755
          restartPolicy: OnFailure
