---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: citizen-portal
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: citizen-portal
---
# Role for developers to read resources in citizen-portal namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: namespace-reader
  namespace: citizen-portal
rules:
- apiGroups: ["", "apps", "autoscaling", "networking.k8s.io"]
  resources: ["pods", "pods/log", "deployments", "services", "ingresses", "endpoints", "horizontalpodautoscalers", "configmaps"]
  verbs: ["get", "list", "watch"]
---
# RoleBinding for developers group
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-namespace-reader-binding
  namespace: citizen-portal
subjects:
- kind: Group
  name: my-company:developers
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: namespace-reader
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for reading global resources like nodes or storage classes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-resource-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "persistentvolumes", "storageclasses"]
  verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding connecting developers to cluster-resource-reader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: developer-cluster-reader-binding
subjects:
- kind: Group
  name: my-company:developers
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-resource-reader
  apiGroup: rbac.authorization.k8s.io
