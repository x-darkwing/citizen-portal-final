apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-backup-scripts
  namespace: citizen-portal
data:
  backup.sh: |
    #!/bin/bash
    set -e
    DATE=$(date +%Y-%m-%d_%H-%M-%S)
    BACKUP_FILE="/backups/db_backup_$DATE.sql"
    ENCRYPTED_FILE="/backups/db_backup_$DATE.sql.enc"
    
    echo "Starting database backup..."
    PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h db-rw -U $POSTGRES_USER -d $POSTGRES_DB -F c -f $BACKUP_FILE
    
    echo "Encrypting backup..."
    openssl enc -aes-256-cbc -salt -in $BACKUP_FILE -out $ENCRYPTED_FILE -pass pass:$BACKUP_ENCRYPTION_PASSWORD -pbkdf2
    rm $BACKUP_FILE
    
    echo "Verifying backup..."
    openssl enc -aes-256-cbc -d -in $ENCRYPTED_FILE -pass pass:$BACKUP_ENCRYPTION_PASSWORD -pbkdf2 | pg_restore -l > /dev/null
    
    echo "Backup verified and saved to $ENCRYPTED_FILE"
    
    echo "Applying retention policy (keeping last 7 days)..."
    find /backups -type f -name "*.sql.enc" -mtime +7 -exec rm {} \;
    echo "Backup process completed successfully."

  restore.sh: |
    #!/bin/bash
    set -e
    if [ -z "$1" ]; then
      echo "Usage: /scripts/restore.sh <backup_filename.sql.enc>"
      exit 1
    fi
    BACKUP_FILE="/backups/$1"
    
    if [ ! -f "$BACKUP_FILE" ]; then
      echo "File not found: $BACKUP_FILE"
      exit 1
    fi
    
    echo "Decrypting and restoring backup from $BACKUP_FILE..."
    # -c cleans (drops) database objects before recreating them
    openssl enc -aes-256-cbc -d -in $BACKUP_FILE -pass pass:$BACKUP_ENCRYPTION_PASSWORD -pbkdf2 | PGPASSWORD=$POSTGRES_PASSWORD pg_restore -h db-rw -U $POSTGRES_USER -d $POSTGRES_DB -c -1
    
    echo "Restore completed successfully."
