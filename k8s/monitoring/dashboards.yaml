apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  kubernetes-cluster.json: |-
    {
      "id": null,
      "title": "Kubernetes Cluster Health",
      "tags": ["kubernetes", "cluster"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 0,
      "refresh": "10s",
      "panels": [
        {
          "type": "graph",
          "title": "CPU Usage",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{image!=\"\"}[1m]))",
              "legendFormat": "Cluster CPU Cores"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Memory Usage",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{image!=\"\"})",
              "legendFormat": "Cluster Memory Bytes"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Pods",
          "targets": [
            {
              "expr": "count(kube_pod_info)",
              "legendFormat": "Pods"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Network I/O",
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total[1m]))",
              "legendFormat": "Receive"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total[1m]))",
              "legendFormat": "Transmit"
            }
          ]
        },
        {
          "type": "table",
          "title": "Node Status",
          "targets": [
            {
              "expr": "kube_node_status_condition{condition=\"Ready\",status=\"true\"}",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Container Restarts",
          "targets": [
            {
              "expr": "sum(rate(kube_pod_container_status_restarts_total[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
