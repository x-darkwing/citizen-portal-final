---
- name: Join K3s Worker Nodes
  hosts: worker
  become: yes
  tasks:
    - name: Install K3s agent and join cluster
      shell: curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] | default(groups['master'][0]) }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_cluster_token'] }} sh -
      args:
        creates: /etc/systemd/system/k3s-agent.service
