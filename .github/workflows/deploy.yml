name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --no-cache -t citizen-portal-backend:latest ./backend

      - name: Build frontend image
        run: docker build --no-cache -t citizen-portal-frontend:latest ./frontend

      - name: Import images into k3s
        run: |
          docker save citizen-portal-backend:latest | sudo k3s ctr images import -
          docker save citizen-portal-frontend:latest | sudo k3s ctr images import -

      - name: Update Kubernetes secrets
        run: |
          kubectl delete secret citizen-portal-secret -n citizen-portal --ignore-not-found
          kubectl create secret generic citizen-portal-secret \
            --namespace citizen-portal \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} \
            --from-literal=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment backend -n citizen-portal
          kubectl rollout restart deployment frontend -n citizen-portal

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n citizen-portal --timeout=120s
          kubectl rollout status deployment/frontend -n citizen-portal --timeout=120s

      - name: Verify pods
        run: kubectl get pods -n citizen-portal
